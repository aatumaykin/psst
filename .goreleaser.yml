version: 2

builds:
  - main: ./cmd/psst
    ldflags:
      - -s -w -X github.com/aatumaykin/psst/internal/version.Version={{.Version}} -X github.com/aatumaykin/psst/internal/version.Commit={{.Commit}} -X github.com/aatumaykin/psst/internal/version.Date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: aatumaykin
    name: psst
